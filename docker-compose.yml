services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "55439:5432"
    environment:
      POSTGRES_DB: work_log
      POSTGRES_USER: work_log
      POSTGRES_PASSWORD: work_log
    volumes:
      - work_log_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U work_log -d work_log"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  work_log_postgres:

